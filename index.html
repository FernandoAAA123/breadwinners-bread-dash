<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BRADWINNERS: BREAD DASH! v3.9 - MENÚ REDISEÑADO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c15;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
            touch-action: none;
        }

        /* Notificaciones toast */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #ffae00;
            border-radius: 40px;
            padding: 10px 20px;
            font-size: 10px;
            color: #ffae00;
            z-index: 20000;
            text-align: center;
            white-space: nowrap;
            font-family: 'Press Start 2P', monospace;
            animation: toastFade 2s ease forwards;
            pointer-events: none;
        }
        @keyframes toastFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .pixel-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            text-transform: uppercase;
            color: white;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            border-radius: 60px;
            box-shadow: 0 6px 0 var(--shadow), 0 0 12px var(--glow);
            transition: all 0.08s linear;
            letter-spacing: 1px;
            gap: 8px;
        }
        .pixel-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--shadow), 0 0 18px var(--glow);
        }
        .btn-blue { --bg-start: #0057af; --bg-end: #0088ff; --shadow: #003d7a; --glow: #0088ff; }
        .btn-orange { --bg-start: #d87000; --bg-end: #ffaa33; --shadow: #8a4800; --glow: #ffaa33; }
        .btn-green { --bg-start: #008751; --bg-end: #00cc77; --shadow: #005a36; --glow: #00cc77; }
        .btn-red { --bg-start: #a00000; --bg-end: #ff3333; --shadow: #6b0000; --glow: #ff3333; }
        .btn-purple { --bg-start: #6a0dad; --bg-end: #aa44ff; --shadow: #3a005f; --glow: #aa44ff; }
        .btn-pink { --bg-start: #b83b5e; --bg-end: #ff6699; --shadow: #7a2a40; --glow: #ff6699; }
        .btn-yellow { --bg-start: #cc8800; --bg-end: #ffcc44; --shadow: #8a5a00; --glow: #ffcc44; }
        .btn-cyan { --bg-start: #009999; --bg-end: #33cccc; --shadow: #006666; --glow: #33cccc; }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background-size: cover;
            background-position: center;
        }

        /* ===== NUEVO SPLASH CON DISEÑO MEJORADO ===== */
        #splash {
            background: radial-gradient(ellipse at 30% 40%, #0a0f1a, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .splash-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://files.catbox.moe/hnylbm.webp');
            background-size: cover;
            background-position: center;
            opacity: 0.85;
            filter: brightness(1.1) saturate(1.2) contrast(1.1);
            z-index: 0;
        }
        /* Efecto CRT + scanlines sobre la imagen */
        .splash-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 1;
        }
        /* Degradado oscuro arriba/abajo para legibilidad */
        .splash-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }
        .splash-content {
            text-align: center;
            animation: fadeInUp 1s ease;
            position: relative;
            z-index: 3;
            background: rgba(0,0,0,0.55);
            padding: 30px 50px;
            border-radius: 60px;
            backdrop-filter: blur(6px);
            border: 2px solid rgba(255,174,0,0.6);
            box-shadow: 0 0 40px rgba(255,174,0,0.3);
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .splash-title { 
            font-size: clamp(28px, 12vw, 54px); 
            color: #ffc107; 
            text-shadow: 0 0 10px #ffae00, 0 0 20px #ffae00; 
            margin-bottom: 20px; 
            letter-spacing: 4px;
        }
        .splash-sub { 
            font-size: clamp(12px, 5vw, 16px); 
            color: #ffdd99; 
            margin-bottom: 40px;
            text-shadow: 0 0 5px #000;
        }
        .splash-btn {
            font-size: 18px !important;
            padding: 14px 40px !important;
            background: linear-gradient(135deg, #d87000, #ffaa33) !important;
            box-shadow: 0 8px 0 #8a4800, 0 0 20px #ffaa33 !important;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .splash-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #8a4800, 0 0 20px #ffaa33 !important;
        }

        #lobby { background: linear-gradient(135deg, #0f1722, #05080f); overflow-y: auto; }
        .lobby-container { max-width: 1200px; margin: 0 auto; padding: 20px; width: 100%; display: flex; flex-direction: column; min-height: 100%; }
        .lobby-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; padding: 15px 0; border-bottom: 2px solid rgba(255,174,0,0.3); margin-bottom: 30px; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-icon { font-size: 32px; filter: drop-shadow(0 0 8px #ffae00); }
        .logo-text { font-size: 14px; color: #ffae00; }
        .player-stats { display: flex; gap: 15px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 8px 20px; border-radius: 60px; border: 1px solid rgba(255,174,0,0.3); flex-wrap: wrap; justify-content: center; }
        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #ffdd99; }
        .stat-value { color: white; font-weight: bold; }
        .lobby-main { display: flex; flex-direction: row; flex-wrap: wrap; gap: 30px; justify-content: center; align-items: center; margin: 40px 0; }
        .van-showcase { flex: 1; min-width: 250px; text-align: center; }
        .van-card { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border-radius: 40px; padding: 30px 20px; border: 1px solid rgba(255,174,0,0.4); }
        .van-pixel { width: min(240px, 70vw); height: auto; aspect-ratio: 2 / 1; background: linear-gradient(145deg, #e05a1a, #a03200); border-radius: 32px; margin: 0 auto 20px; box-shadow: 0 12px 0 #3b1e00, 0 0 0 3px #ffb347, 0 0 0 6px rgba(255,180,70,0.3); }
        .stats-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 15px; }
        .stat-badge { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,174,0,0.4); border-radius: 40px; padding: 6px 16px; font-size: 9px; display: flex; align-items: center; gap: 8px; }
        .menu-buttons { flex: 1; min-width: 280px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 48px; padding: 30px; border: 1px solid rgba(255,174,0,0.2); }
        .menu-buttons .pixel-btn { width: 100%; justify-content: center; }
        .lobby-footer { margin-top: auto; text-align: center; padding: 30px 0 20px; }
        .start-btn { font-size: 22px !important; padding: 18px 40px !important; background: linear-gradient(135deg, #00a86b, #00e676) !important; box-shadow: 0 8px 0 #005a36, 0 0 20px #00e676 !important; }
        @media (max-width: 700px) { .lobby-main { flex-direction: column; } .menu-buttons { grid-template-columns: 1fr; } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: rgba(20, 25, 40, 0.98); border: 2px solid #ffae00; border-radius: 32px; width: 100%; max-width: 1000px; padding: 24px; max-height: 85vh; overflow-y: auto; }
        .modal-box::-webkit-scrollbar { width: 6px; }
        .modal-box::-webkit-scrollbar-thumb { background: #ffae00; border-radius: 6px; }

        .encyclopedia-tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid rgba(255,174,0,0.3); padding-bottom: 12px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; cursor: pointer; padding: 6px 16px; border-radius: 40px; transition: all 0.1s; }
        .tab-btn.active { background: rgba(255,174,0,0.2); color: #ffae00; box-shadow: 0 0 8px rgba(255,174,0,0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .encyclopedia-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin: 20px 0; }
        .enemy-card, .bread-card, .vehicle-card { background: rgba(0,0,0,0.6); border: 1px solid #ffae00; border-radius: 24px; padding: 16px; text-align: center; transition: transform 0.1s, box-shadow 0.2s; }
        .enemy-card:hover, .bread-card:hover, .vehicle-card:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255,174,0,0.5); }
        .enemy-img, .bread-img, .vehicle-img { width: 80px; height: 80px; background-size: contain; background-repeat: no-repeat; background-position: center; margin: 0 auto 12px; filter: drop-shadow(0 0 6px #ffae00); }
        .enemy-stats, .bread-stats, .vehicle-stats { font-size: 9px; color: #ccc; text-align: left; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        .enemy-stats div, .bread-stats div, .vehicle-stats div { margin: 4px 0; }
        .bg-preview { width: 100%; height: 100px; background-size: cover; background-position: center; border-radius: 16px; margin-bottom: 12px; border: 1px solid #ffae00; }
        .upgrade-card .card-icon { font-size: 28px; margin-bottom: 8px; }
        .upgrade-card .card-name { font-size: 11px; color: #ffae00; margin-bottom: 6px; }
        .upgrade-card .card-desc { font-size: 8px; color: #aaa; line-height: 1.5; }

        .hud { position: absolute; top: 15px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; pointer-events: none; z-index: 30; flex-wrap: wrap; gap: 10px; }
        .hud-panel { background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); border-radius: 60px; padding: 6px 16px; border: 2px solid rgba(255,174,0,0.8); display: flex; gap: 16px; align-items: center; }
        .hud-stat { display: flex; align-items: center; gap: 6px; font-size: 10px; }
        .hud-stat span { font-size: 12px; }
        .lives { display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 40px; }
        .pause-btn { pointer-events: auto; cursor: pointer; background: linear-gradient(135deg, #6a0dad, #9b4dff); padding: 6px 12px; border-radius: 40px; font-size: 12px; }
        .pause-overlay, .game-over-panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.92); backdrop-filter: blur(16px); border: 3px solid #ffae00; border-radius: 48px; padding: 24px 20px; text-align: center; width: min(90%, 320px); z-index: 200; display: none; flex-direction: column; gap: 16px; }
        .powerup-hud { position: absolute; bottom: 20px; left: 16px; right: 16px; display: flex; gap: 8px; flex-wrap: wrap; pointer-events: none; z-index: 40; }
        .powerup-card { background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); border-left: 4px solid; border-radius: 40px; padding: 5px 12px; font-size: 8px; display: flex; align-items: center; gap: 10px; }
        .powerup-timer { width: 70px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .boss-health-bar { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: min(340px, 80%); height: 18px; background: #1a1a2a; border: 2px solid #ffae00; border-radius: 40px; z-index: 50; display: none; overflow: hidden; }
        .boss-health-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff8888); width: 100%; transition: width 0.15s; }
        canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
        .frenzy-bar { position: absolute; bottom: 20px; right: 20px; width: 120px; background: rgba(0,0,0,0.7); border-radius: 20px; padding: 4px 8px; text-align: center; font-size: 8px; color: #ff6600; border: 1px solid #ff6600; backdrop-filter: blur(4px); }
        .frenzy-fill { height: 4px; background: #ff6600; width: 0%; transition: width 0.1s; margin-top: 4px; border-radius: 2px; }
    </style>
</head>
<body>

<!-- splash con imágenes de transición -->
<div id="splash-container" style="position:fixed;inset:0;z-index:10000;background:black;display:flex;justify-content:center;align-items:center;">
    <img id="splash-nick" style="max-width:90%;max-height:90%;display:none;object-fit:contain;" src="https://files.catbox.moe/70s6vg.jpg">
    <img id="splash-forest" style="max-width:90%;max-height:90%;display:none;object-fit:contain;" src="https://files.catbox.moe/l2t0oy.jpg">
</div>

<div id="splash" class="screen">
    <div class="splash-bg"></div>
    <div class="splash-overlay"></div>
    <div class="splash-content">
        <div class="splash-title">BRADWINNERS</div>
        <div class="splash-sub">BREAD DASH! v3.9</div>
        <button class="pixel-btn btn-orange splash-btn" onclick="window.enterLobby()">START</button>
    </div>
</div>

<div id="lobby" class="screen">
    <div class="lobby-container">
        <div class="lobby-header">
            <div class="logo-area"><div class="logo-icon">🍞</div><div class="logo-text">BRADWINNERS</div></div>
            <div class="player-stats"><div class="stat-item">NAME <span id="u-name" class="stat-value">PATITO</span></div><div class="stat-item">BREAD <span id="u-breads" class="stat-value">0</span></div><div class="stat-item">RECORD <span id="record-score" class="stat-value">0</span> km</div></div>
        </div>
        <div class="lobby-main">
            <div class="van-showcase">
                <div class="van-card"><div class="van-pixel"></div><div class="van-name">ROCKET VAN</div>
                    <div class="stats-grid"><div class="stat-badge">ATK <span id="lvl-attack">1</span></div><div class="stat-badge">FIRE <span id="lvl-fire">1</span></div><div class="stat-badge">LIVES <span id="lvl-lives">10</span></div><div class="stat-badge">MAGNET <span id="lvl-magnet">1</span></div></div>
                </div>
            </div>
            <div class="menu-buttons">
                <button class="pixel-btn btn-orange" onclick="window.openModal('shop')">SHOP</button>
                <button class="pixel-btn btn-cyan" onclick="window.openModal('workshop')">GARAGE</button>
                <button class="pixel-btn btn-purple" onclick="window.openModal('team')">CREW</button>
                <button class="pixel-btn btn-yellow" onclick="window.openModal('encyclopedia')">ENCYCLOPEDIA</button>
                <button class="pixel-btn btn-pink" onclick="window.openModal('achievements')">ACHIEVEMENTS</button>
                <button class="pixel-btn btn-blue" onclick="window.openModal('profile')">PROFILE</button>
                <button class="pixel-btn btn-green" onclick="window.openModal('missions')">MISSIONS</button>
            </div>
        </div>
        <div class="lobby-footer">
            <button class="pixel-btn btn-green start-btn" onclick="window.startGame()">DELIVER!</button>
        </div>
    </div>
</div>

<div id="modal" class="modal-overlay"><div class="modal-box"><div id="modal-content"></div><button class="pixel-btn btn-red" style="margin-top:20px; width:100%;" onclick="window.closeModal()">CLOSE</button></div></div>

<div id="game-screen" class="screen">
    <div class="hud">
        <div class="hud-panel"><div class="hud-stat">KM <span id="g-score">0</span></div><div class="hud-stat">BREAD <span id="g-breads">0</span></div><div class="hud-stat">x<span id="g-multiplier">1</span></div></div>
        <div class="hud-panel"><div class="lives" id="lives-container">🍞🍞🍞</div><div class="pause-btn pixel-btn" onclick="window.togglePause()">⏸</div></div>
    </div>
    <div id="bossHealthBar" class="boss-health-bar"><div id="bossHealthFill" class="boss-health-fill"></div></div>
    <canvas id="gameCanvas"></canvas>
    <div id="pauseMenu" class="pause-overlay">
        <button class="pixel-btn btn-green" onclick="window.resumeGame()">RESUME</button>
        <button class="pixel-btn btn-blue" onclick="window.openOptionsFromPause()">OPTIONS</button>
        <button class="pixel-btn btn-cyan" onclick="window.openModal('missions')">MISSIONS</button>
        <button class="pixel-btn btn-red" onclick="window.exitToLobbyFromPause()">EXIT</button>
    </div>
    <div id="powerupHUD" class="powerup-hud"></div>
    <div id="frenzyIndicator" class="frenzy-bar">FRENZY <div id="frenzyFill" class="frenzy-fill"></div></div>
    <div id="gameOverlay" class="game-over-panel">
        <h3 style="color:#ff4444;">GAME OVER</h3><p id="finalStats"></p>
        <button class="pixel-btn btn-orange" onclick="window.retryGame()">RETRY</button>
        <button class="pixel-btn btn-blue" onclick="window.returnToLobby()">LOBBY</button>
    </div>
</div>

<script>
    (function(){
        // ========== NOTIFICACIONES TOAST ==========
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.textContent = message;
            if (isError) toast.style.borderColor = '#ff4444';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ========== INTRO ==========
        const splashContainer = document.getElementById('splash-container');
        const nickImg = document.getElementById('splash-nick');
        const forestImg = document.getElementById('splash-forest');
        const gameSplash = document.getElementById('splash');
        let introActive = true;
        let timeoutId = null;
        function finishIntro() { if (!introActive) return; introActive = false; if (timeoutId) clearTimeout(timeoutId); splashContainer.style.opacity = '0'; setTimeout(() => { splashContainer.style.display = 'none'; gameSplash.style.display = 'flex'; }, 1000); }
        function startIntro() { nickImg.style.display = 'block'; nickImg.style.opacity = '1'; setTimeout(() => { if (!introActive) return; nickImg.style.opacity = '0'; setTimeout(() => { nickImg.style.display = 'none'; forestImg.style.display = 'block'; forestImg.style.opacity = '1'; timeoutId = setTimeout(() => { if (introActive) finishIntro(); }, 2500); }, 800); }, 2500); }
        let imagesLoaded = 0;
        function onImageLoad() { imagesLoaded++; if (imagesLoaded === 2) startIntro(); }
        nickImg.onload = onImageLoad; forestImg.onload = onImageLoad;
        if (nickImg.complete) onImageLoad(); if (forestImg.complete) onImageLoad();
        splashContainer.addEventListener('click', () => { if (introActive) finishIntro(); });

        // ========== FONDOS ==========
        const backgroundsList = [
            { id: "default", name: "SKY", url: "https://files.catbox.moe/fa4uq0.png", cost: 0, unlockedByDefault: true },
            { id: "ciudad_arbol", name: "TREE CITY", url: "https://files.catbox.moe/poq4h3.webp", cost: 300, unlockedByDefault: false },
            { id: "cuackmetropolis", name: "CUACKMETROPOLIS", url: "https://files.catbox.moe/n9wip4.png", cost: 500, unlockedByDefault: false },
            { id: "valle_volcanico", name: "VOLCANIC VALLEY", url: "https://files.catbox.moe/q50jfk.webp", cost: 800, unlockedByDefault: false },
            { id: "valle_prehistorico", name: "PREHISTORIC VALLEY", url: "https://files.catbox.moe/spl4ed.png", cost: 1000, unlockedByDefault: false },
            { id: "mina_pan", name: "BREAD MINE", url: "https://files.catbox.moe/601fev.png", cost: 1500, unlockedByDefault: false },
            { id: "espacio", name: "SPACE", url: "https://files.catbox.moe/nu30xg.png", cost: 2000, unlockedByDefault: false },
            { id: "colonia_levadura", name: "YEAST COLONY", url: "https://files.catbox.moe/uejxzy.webp", cost: 1000, unlockedByDefault: false },
            { id: "triangulo_pondgea", name: "TRIÁNGULO DE LA PONDGEA", url: "https://files.catbox.moe/3x7t6j.webp", cost: 1800, unlockedByDefault: false }
        ];
        let unlockedBackgrounds = [];
        let currentBackgroundId = "default";
        let currentBackgroundImage = new Image();
        let backgroundOffset = 0;
        function loadBackgroundsData() { const saved = localStorage.getItem('bw_unlocked_bgs'); unlockedBackgrounds = saved ? JSON.parse(saved) : backgroundsList.filter(b=>b.unlockedByDefault).map(b=>b.id); const savedCurr = localStorage.getItem('bw_current_bg'); currentBackgroundId = (savedCurr && unlockedBackgrounds.includes(savedCurr)) ? savedCurr : "default"; updateBackgroundImage(); }
        function saveBackgroundsData() { localStorage.setItem('bw_unlocked_bgs', JSON.stringify(unlockedBackgrounds)); localStorage.setItem('bw_current_bg', currentBackgroundId); }
        function updateBackgroundImage() { const bg = backgroundsList.find(b=>b.id===currentBackgroundId); if(bg) currentBackgroundImage.src = bg.url; }
        function unlockBackground(bgId) { if(!unlockedBackgrounds.includes(bgId)){ unlockedBackgrounds.push(bgId); saveBackgroundsData(); } }
        function setCurrentBackground(bgId) { if(unlockedBackgrounds.includes(bgId)){ currentBackgroundId=bgId; saveBackgroundsData(); updateBackgroundImage(); } }

        // ========== MEJORAS ==========
        let upgrades = {
            baseShoot: { unlocked: false, cost: 500, name: "Basic Shot", desc: "Allows shooting without power-up" },
            attackLevel: { level: 1, max:5, costUpgrade: 800, name: "Attack+", desc: "Increases bullet damage" },
            autoCollect: { unlocked: false, cost: 1200, name: "Auto Collect", desc: "Automatically attracts bread" },
            fireRate: { level: 1, max:4, costUpgrade: 700, name: "Fire Rate+", desc: "Shoot faster" },
            maxLife: { level: 10, max:15, cost: 1500, name: "Max Life+1", desc: "Increases maximum health" },
            magnetLevel: { level: 1, max:5, costUpgrade: 600, name: "Magnet+", desc: "Wider collection range" },

                entities.push({ x:canvas.width+40, y:yPos, w:35, h:35, speed:3, type:'powerup', powerId:pwr, img:powerupImages[pwr] });
                return;
            }
            let totalWeight = unlocked.reduce((sum, e) => sum + e.weight, 0);
            let rand = Math.random() * totalWeight;
            let accum = 0;
            let selected = unlocked[0];
            for(let e of unlocked) { accum += e.weight; if(rand <= accum) { selected = e; break; } }
            let yPos = Math.random()*(canvas.height-70);
            let w=50, h=50;
            if(selected.id === 'egg') { w=65; h=65; }
            if(selected.id === 'balloon') { w=55; h=55; }
            let speedMult = 1 + (score / 800);
            let enemy = { x: canvas.width+40, y: yPos, w, h, speed: selected.speed * speedMult, type: selected.id,
                health: selected.health, armor: selected.armor, damage: selected.damage,
                img: selected.img, deathImg: selected.deathImg, shootTimer: 0, behavior: selected.behavior || 'horizontal',
                vx: 0, vy: 0, gravity: 0.5, reward: selected.reward };
            if(selected.behavior === 'parabola') { 
                enemy.vx = -selected.speed * speedMult - Math.random()*2; 
                enemy.vy = -Math.random()*12 - 8; 
                enemy.gravity = 0.6;
                enemy.bouncing = true;
            }
            if(selected.behavior === 'parabola_fast') { 
                enemy.vx = -selected.speed * speedMult - 3; 
                enemy.vy = -Math.random()*14 - 10; 
                enemy.gravity = 0.7;
                enemy.bouncing = true;
            }
            if(selected.behavior === 'zigzag') enemy.floatOffset = Math.random()*Math.PI*2;
            if(selected.shoot) enemy.shootConfig = selected.shoot;
            entities.push(enemy);
        }

                if(e.behavior === 'parabola' || e.behavior === 'parabola_fast') {
                    e.x += e.vx;
                    e.y += e.vy;
                    e.vy += e.gravity;
                    if(e.y + e.h >= canvas.height) {
                        e.y = canvas.height - e.h;
                        e.vy = -Math.abs(e.vy) * 0.7;
                        if(Math.abs(e.vy) < 2) e.vy = -6;
                    }
                    if(e.y < 0) {
                        e.y = 0;
                        e.vy = Math.abs(e.vy) * 0.7;
                    }
                    if(e.x + e.w < 0) { entities.splice(i,1); i--; }
                    continue;
                }
                if(e.behavior === 'zigzag') {
                    e.x -= e.speed;
                    e.y += Math.sin(Date.now()*0.01 + e.x*0.05)*3;
                    e.y = Math.max(10, Math.min(canvas.height-e.h-10, e.y));
                } else {
                    e.x -= e.speed;
                }
                if(e.shootConfig) {
                    e.shootTimer = (e.shootTimer || 0) + 1;
                    let cd = e.shootConfig.cooldown;
                    if(e.shootTimer > cd) {
                        e.shootTimer = 0;
                        let hitbox = getVanHitbox();
                        let dx = (hitbox.x+hitbox.w/2) - (e.x+e.w/2);
                        let dy = (hitbox.y+hitbox.h/2) - (e.y+e.h/2);
                        let len = Math.hypot(dx,dy);
                        if(len < 0.1) len=1;
                        let vx = dx/len * e.shootConfig.speed;
                        let vy = dy/len * e.shootConfig.speed;
                        projectiles.push({ x:e.x+e.w/2-12, y:e.y+e.h/2-12, w:24, h:24, vx, vy, damage: e.shootConfig.damage, homing: e.shootConfig.homing || false });
                    }
                }
            }
        }

        function updateProjectiles() {
            let hitbox = getVanHitbox();
            for(let i=0; i<projectiles.length; i++) {
                let p = projectiles[i];
                p.x += p.vx; p.y += p.vy;
                if(p.homing) {
                    let targetX = hitbox.x+hitbox.w/2, targetY = hitbox.y+hitbox.h/2;
                    let dx = targetX - p.x, dy = targetY - p.y;
                    let len = Math.hypot(dx,dy);
                    if(len > 0.01) {
                        let normX = dx/len, normY = dy/len;
                        let newVx = p.vx + normX*0.2, newVy = p.vy + normY*0.2;
                        let newLen = Math.hypot(newVx, newVy);
                        if(newLen > 0.01) { let spd = Math.hypot(p.vx, p.vy); p.vx = (newVx/newLen)*spd; p.vy = (newVy/newLen)*spd; }
                    }
                }
                if(p.x < hitbox.x+hitbox.w && p.x+p.w > hitbox.x && hitbox.y < p.y+p.h && hitbox.y+hitbox.h > p.y) {
                    if(activePowerups.reflect) { p.vx = -p.vx; p.vy = -p.vy; continue; }
                    if(invincibleFrames <= 0 && !activePowerups.shield && !activePowerups.superSpeed) takeDamage(p.damage, null);
                    projectiles.splice(i,1); i--;
                    continue;
                }
                if(p.x+p.w < 0 || p.x > canvas.width+200 || p.y+p.h < 0 || p.y > canvas.height+200) projectiles.splice(i,1);
            }
        }

        function updatePlayerShoot() {
            let canShoot = activePowerups.shoot || upgrades.baseShoot.unlocked;
            if(!canShoot) return;
            let cooldownBase = [15,12,10,8][gameData.shootCooldownLvl-1] || 8;
            let fireRateBonus = (upgrades.fireRate.level-1)*2;
            if(activePowerups.superSpeed) fireRateBonus += 4;
            let cooldown = Math.max(3, cooldownBase - fireRateBonus);
            if(playerShootCooldown > 0) { playerShootCooldown--; return; }
            let hitbox = getVanHitbox();
            let centerX = hitbox.x+hitbox.w;
            let centerY = hitbox.y+hitbox.h/2;
            let attackPower = upgrades.attackLevel.level;
            if(activePowerups.attack) attackPower++;
            if(activePowerups.triple) {
                for(let i=-1; i<=1; i++) playerProjectiles.push({ x:centerX-5, y:centerY-8 + i*12, w:12, h:12, vx: 14, vy: i*2, power: attackPower });
            } else {
                playerProjectiles.push({ x:centerX-5, y:centerY-8, w:12, h:12, vx: 14, vy: 0, power: attackPower });
            }
            playerShootCooldown = cooldown;
            shotsFired++;
            checkAchievements();
        }

        function updatePlayerProjectiles() {
            for(let i=0;i<playerProjectiles.length;i++) {
                let p = playerProjectiles[i];
                p.x += p.vx; p.y += p.vy;
                if(p.x > canvas.width+100 || p.x < -100 || p.y < -100 || p.y > canvas.height+100) { playerProjectiles.splice(i,1); i--; continue; }
                let hit = false;
                for(let j=0;j<entities.length;j++) {
                    let e = entities[j];
                    if(e.type !== 'bread' && e.type !== 'powerup' && p.x < e.x+e.w && p.x+p.w > e.x && p.y < e.y+e.h && p.y+p.h > e.y) {
                        if(p.power > e.armor) {
                            e.health -= 1;
                            if(e.health <= 0) {
                                if(e.isBoss) { bossDefeated = true; currentBoss = null; document.getElementById('bossHealthBar').style.display = 'none'; }
                                addFallingEnemy(e.x, e.y, e.w, e.h, e.deathImg);
                                entities.splice(j,1);
                                killCount++;
                                if(e.armor >= 2) eliteKills++;
                                checkAchievements();
                                updateMissions();
                            } else if(e.isBoss) {
                                let percent = (e.health / e.maxHealth) * 100;
                                document.getElementById('bossHealthFill').style.width = percent + '%';
                            }
                            hit=true;
                            break;
                        }
                    }
                }
                if(hit) { playerProjectiles.splice(i,1); i--; }
            }
        }

        function checkCollisions() {
            let hitbox = getVanHitbox();
            for(let i=0;i<entities.length;i++) {
                let e = entities[i];
                if(e.type === 'bread') {
                    if(e.x < hitbox.x+hitbox.w && e.x+e.w > hitbox.x && hitbox.y < e.y+e.h && hitbox.y+hitbox.h > e.y) {
                        let mult = (activePowerups.double?2:1) * (activePowerups.golden?3:1) * (activePowerups.comboMult?Math.min(3,1+comboCount/5):1);
                        let gain = (1 + (gameData.extraBreadLvl-1)) * gameData.multiplier * mult;
                        if(frenzyActive) gain *= 2;
                        breadCollected += gain;
                        document.getElementById('g-breads').innerText = breadCollected;
                        entities.splice(i,1);
                        checkAchievements();
                        updateMissions();
                        i--;
                    }
                } else if(e.type === 'powerup') {
                    if(e.x < hitbox.x+hitbox.w && e.x+e.w > hitbox.x && hitbox.y < e.y+e.h && hitbox.y+hitbox.h > e.y) {
                        activatePowerup(e.powerId);
                        entities.splice(i,1);
                        i--;
                    }
                } else {
                    if(e.x < hitbox.x+hitbox.w && e.x+e.w > hitbox.x && hitbox.y < e.y+e.h && hitbox.y+hitbox.h > e.y) {
                        if(activePowerups.shield || activePowerups.reflect || activePowerups.superSpeed) {
                            addFallingEnemy(e.x, e.y, e.w, e.h, e.deathImg);
                            entities.splice(i,1);
                            killCount++;
                            checkAchievements();
                            updateMissions();
                            i--;
                        } else {
                            if(invincibleFrames <= 0) {
                                let sourceType = (e.type === 'electric') ? 'electric' : null;
                                takeDamage(e.damage, sourceType);
                            }
                            entities.splice(i,1);
                            i--;
                        }
                    }
                }
            }
        }

        function applyMagnetAndAuto() {
            let magnetActive = activePowerups.magnet || activePowerups.vacuum || upgrades.autoCollect.unlocked;
            if(!magnetActive) return;
            let vanCenter = { x: getVanHitbox().x+getVanHitbox().w/2, y: getVanHitbox().y+getVanHitbox().h/2 };
            let range = activePowerups.magnet ? (180 + (upgrades.magnetLevel.level-1)*60) : (activePowerups.vacuum ? 350 : 130);
            let force = activePowerups.magnet ? 4 : (activePowerups.vacuum ? 7 : 3);
            for(let e of entities) {
                if(e.type === 'bread') {
                    let dx = vanCenter.x - (e.x+e.w/2);
                    let dy = vanCenter.y - (e.y+e.h/2);
                    let dist = Math.hypot(dx,dy);
                    if(dist < range) {
                        let angle = Math.atan2(dy,dx);
                        e.x += Math.cos(angle) * force;
                        e.y += Math.sin(angle) * force;
                    }
                }
            }
        }

        // ========== AUDIO ==========
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function getAudio() { if(!audioCtx) try { audioCtx = new AudioCtx(); } catch(e){} return audioCtx; }
        function playTone(freq, type='square', vol=0.15, dur=0.1, delay=0) {
            const ctx = getAudio(); if(!ctx) return;
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = type; o.frequency.value = freq;
            const t = ctx.currentTime + delay;
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + dur);
            o.start(t); o.stop(t + dur);
        }
        function sfxCollect() { playTone(880,'sine',0.1,0.08); playTone(1320,'sine',0.08,0.08,0.05); }
        function sfxHit()     { playTone(180,'sawtooth',0.2,0.12); }
        function sfxShoot()   { playTone(440,'square',0.06,0.05); }
        function sfxPowerup() { [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.1,0.12,i*0.08)); }
        function sfxKill()    { playTone(300,'square',0.12,0.08); playTone(150,'square',0.12,0.08,0.06); }
        function sfxSpecial() { [100,200,400,800,1600].forEach((f,i)=>playTone(f,'sawtooth',0.15,0.15,i*0.05)); }
        function showFloatingText(txt, x, y, color) { /* dummy */ }

        // ========== PODER ESPECIAL ==========
        function activateSpecial() {
            if(!specialReady || specialActive) return;
            specialCharge = 0; specialReady = false; specialActive = true; specialFrames = 180;
            specialUsed++; document.getElementById('specialBtn').classList.remove('ready');
            document.getElementById('specialFill').style.width = '0%';
            sfxSpecial();
            for(let i=entities.length-1;i>=0;i--) {
                const e = entities[i];
                if(e.type !== 'bread' && e.type !== 'powerup') {
                    gameData.breads += e.reward || 5;
                    addFallingEnemy(e.x, e.y, e.w, e.h, e.deathImg);
                    killCount++;
                    entities.splice(i,1);
                }
            }
            for(let i=0;i<30;i++) createExplosion(Math.random()*canvas.width, Math.random()*canvas.height, '#ffd700');
            showWaveBanner("SPECIAL POWER!");
            checkAchievements();
        }

        function updatePowerupHUD() {
            const container = document.getElementById('powerupHUD');
            container.innerHTML = '';
            const now = Date.now();
            for(let [id, active] of Object.entries(activePowerups)) {
                if(active && powerupTimers[id]) {
                    const remaining = Math.max(0, powerupTimers[id] - now);
                    const percent = (remaining / 8000) * 100;
                    const names = { speed:'SPD', magnet:'MAG', double:'x2', shield:'SHD', shoot:'SHT', attack:'ATK', slow:'SLW', golden:'GLD', nuke:'NUK', reflect:'RFL', triple:'3X', vacuum:'VAC', superSpeed:'SSP', comboMult:'CBM' };
                    container.innerHTML += `<div class="powerup-card" style="border-left-color: #ffaa44"><span>${names[id]||id}</span><div class="powerup-timer"><div class="powerup-timer-fill" style="width: ${percent}%"></div></div></div>`;
                }
            }
        }

        function drawGame() {
            if(!ctx) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(currentBackgroundImage.complete && currentBackgroundImage.naturalWidth>0) {
                backgroundOffset = (score * 1.5) % canvas.width;
                ctx.drawImage(currentBackgroundImage, -backgroundOffset, 0, canvas.width, canvas.height);
                ctx.drawImage(currentBackgroundImage, canvas.width - backgroundOffset, 0, canvas.width, canvas.height);
            } else { ctx.fillStyle="#1a2a3a"; ctx.fillRect(0,0,canvas.width,canvas.height); }
            for(let p of particles) { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 6, 6); }
            for(let f of fallingEnemies) { if(f.image && f.image.complete) ctx.drawImage(f.image, f.x, f.y, f.w, f.h); }
            for(let p of projectiles) { if(p.img && p.img.complete) ctx.drawImage(p.img, p.x, p.y, p.w, p.h); else { ctx.fillStyle="#ffaa44"; ctx.fillRect(p.x,p.y,p.w,p.h); } }
            for(let p of playerProjectiles) { ctx.fillStyle="#ff5555"; ctx.fillRect(p.x,p.y,p.w,p.h); }
            for(let e of entities) {
                if(e.img && e.img.complete) ctx.drawImage(e.img, e.x, e.y, e.w, e.h);
                else { ctx.fillStyle="#aa5555"; ctx.fillRect(e.x, e.y, e.w, e.h); }
                if(e.health !== undefined && e.type !== 'bread' && e.type !== 'powerup' && e.health > 0) {
                    ctx.font = "bold 10px 'Press Start 2P'";
                    ctx.fillStyle = "#ff4444";
                    ctx.fillText(`${e.health}❤️`, e.x+5, e.y-8);
                    if(e.armor > 0) { ctx.fillStyle = "#ffaa00"; ctx.fillText(`🔰${e.armor}`, e.x+5, e.y-22); }
                }
            }
            let vanW=100, vanH=70;
            if(images.van.complete) ctx.drawImage(images.van, 70, playerY, vanW, vanH);
            else { ctx.fillStyle="#d87c1a"; ctx.fillRect(70,playerY,vanW,vanH); }
            if(activePowerups.shield){ ctx.strokeStyle="#44ffaa"; ctx.lineWidth=3; ctx.strokeRect(70,playerY,vanW,vanH); }
            if(activePowerups.superSpeed){ ctx.shadowColor="#00ccff"; ctx.shadowBlur=12; ctx.strokeStyle="#00ccff"; ctx.lineWidth=2; ctx.strokeRect(70,playerY,vanW,vanH); ctx.shadowBlur=0; }
            if(invincibleFrames > 0 && (Math.floor(Date.now()/50)%4<2)) ctx.globalAlpha=0.5; else ctx.globalAlpha=1;
            ctx.globalAlpha=1;
        }

        function initCanvas() { canvas = document.getElementById('gameCanvas'); ctx = canvas.getContext('2d'); resizeCanvas(); window.addEventListener('resize', resizeCanvas); }
        function resizeCanvas() { if(canvas){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; if(playing && !paused) targetY = Math.min(Math.max(targetY, 40), canvas.height-100); } }

        function gameLoop(){
            if(!playing || paused) return;
            if(invincibleFrames>0) invincibleFrames--;
            if(comboTimer>0) { comboTimer--; if(comboTimer===0) { comboCount=0; const cd=document.getElementById('comboDisplay'); cd.style.opacity='0'; cd.style.fontSize='0px'; } }
            if(frenzyActive) { frenzyTimer--; if(frenzyTimer<=0) { frenzyActive=false; showWaveBanner("Frenzy ended"); } }
            if(specialActive&&specialFrames>0) { specialFrames--; if(specialFrames===0) specialActive=false; }
            
            let effectiveTargetY = targetY;
            if(playerZigzagActive) {
                playerZigzagTimer--;
                if(playerZigzagTimer <= 0) {
                    playerZigzagActive = false;
                    playerSlowFactor = 1.0;
                } else {
                    let zig = Math.sin(Date.now() * 0.02) * 35;
                    effectiveTargetY = targetY + zig;
                    effectiveTargetY = Math.max(20, Math.min(canvas.height-100, effectiveTargetY));
                }
            }
            
            let moveSpeed = 0.2 * (activePowerups.superSpeed?1.3:1) * playerSlowFactor;
            playerY += (effectiveTargetY - playerY) * moveSpeed;
            playerY = Math.min(Math.max(playerY, 20), canvas.height-90);
            score += 0.05 * (frenzyActive?1.5:1);
            document.getElementById('g-score').innerText = Math.floor(score);
            let totalMult = gameData.multiplier * (activePowerups.double?2:1);
            if(activePowerups.comboMult) totalMult *= Math.min(3, 1+comboCount/10);
            document.getElementById('g-multiplier').innerText = totalMult;
            let now = Date.now();
            for(let k in activePowerups) if(activePowerups[k] && powerupTimers[k] && now > powerupTimers[k]) activePowerups[k]=false;
            specialCharge = Math.min(100, specialCharge + 0.03);
            document.getElementById('specialFill').style.width = specialCharge+'%';
            if(specialCharge>=100 && !specialReady) { specialReady=true; document.getElementById('specialBtn').classList.add('ready'); }
            spawnEntity();
            updateEnemies();
            updateProjectiles();
            updatePlayerShoot();
            updatePlayerProjectiles();
            checkCollisions();
            applyMagnetAndAuto();
            updateFallingEnemies();
            updateParticles();
            updatePowerupHUD();
            drawGame();
            animationId = requestAnimationFrame(gameLoop);
        }

        function endGame(){
            playing=false; if(animationId) cancelAnimationFrame(animationId);
            if(!gameData.recordScore || score > gameData.recordScore) gameData.recordScore = Math.floor(score);
            gameData.breads += breadCollected; saveAllData(); updateUI();
            document.getElementById('finalStats').innerHTML = `KM: ${Math.floor(score)}<br>BREAD: ${breadCollected}<br>ENEMIES: ${killCount}<br>MAX COMBO: ${maxCombo}<br>FRENZIES: ${frenzyCount}`;
            document.getElementById('gameOverlay').style.display = 'flex';
        }

            comboCount=0; comboTimer=0; maxCombo=0; specialCharge=0; specialReady=false; specialActive=false; specialFrames=0;

                    <div id="tab-vehicles" class="tab-content">
                        <h3>ROCKET VAN VARIANTS</h3><div class="encyclopedia-grid">` +
                        vehicleTypes.map(v => `<div class="vehicle-card"><div class="vehicle-img" style="background-image: url('${v.img.src}');"></div><div class="card-name">${v.name}</div><div class="vehicle-stats"><div>Speed: ${v.speed}</div><div>Special: ${v.special}</div><div>${v.desc}</div></div></div>`).join('') +
                        `</div>
                    </div>
                `;
                setTimeout(() => {
                    document.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.onclick = () => {
                            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                        };
                    });
                }, 50);
            }
            else if(type==='achievements') content.innerHTML=`<h3>ACHIEVEMENTS</h3><div class="missions-grid"><div class="mission-card">First Blood: kill 1 enemy</div><div class="mission-card">Bread Master: 200 bread</div><div class="mission-card">Marathon: 1000 km</div><div class="mission-card">Boss Hunter: defeat a boss</div><div class="mission-card">Elite Hunter: kill 5 armored enemies</div><div class="mission-card">Combo x10: reach 10 combo</div><div class="mission-card">Special Power: use special</div><div class="mission-card">Frenzy x10: activate frenzy 10 times</div></div>`;
            else if(type==='missions') {
                loadMissions();
                content.innerHTML = `<h3>DAILY MISSIONS</h3><div class="missions-grid">${missions.map(m=>`<div class="mission-card"><div class="card-icon">${m.completed?'✓':'⏳'}</div><div class="card-name">${m.desc}</div><div class="card-desc">Progress: ${m.progress}/${m.target}</div><div class="card-desc">Reward: ${m.reward} bread</div>${m.completed?'<div class="stat-badge">COMPLETED</div>':''}</div>`).join('')}</div>`;
            }
            else if(type==='options') content.innerHTML=`<h3>OPTIONS</h3><button class="pixel-btn btn-red" onclick="if(confirm('Delete all data?')){localStorage.clear();location.reload()}" style="width:100%;margin-top:12px">RESET DATA</button>`;
        };
        window.closeModal = function(){ document.getElementById('modal').style.display='none'; };
        window.changeName = function(){ let newName=document.getElementById('newNameInput').value.trim().toUpperCase(); if(newName) gameData.name=newName.slice(0,14); saveAllData(); updateUI(); window.closeModal(); };
        window.purchaseBackground = function(bgId, cost){ if(gameData.breads>=cost){ gameData.breads-=cost; saveAllData(); unlockBackground(bgId); updateUI(); window.openModal('shop'); showToast("Background unlocked"); } else showToast("Not enough bread", true); };
        window.selectBackground = function(bgId){ setCurrentBackground(bgId); window.openModal('shop'); };
        window.buyUpgrade = buyUpgrade;
        window.activateSpecial = activateSpecial;

        function handleMove(clientY){ if(!playing || paused || !canvas) return; let rect=canvas.getBoundingClientRect(); let scaleY=canvas.height/rect.height; targetY=Math.min(Math.max((clientY-rect.top)*scaleY-50, 20), canvas.height-100); }
        window.addEventListener('mousemove',(e)=>handleMove(e.clientY));
        window.addEventListener('touchmove',(e)=>{ e.preventDefault(); if(e.touches.length) handleMove(e.touches[0].clientY); },{passive:false});
        window.addEventListener('keydown', e=>{ if(e.code==='Space') { e.preventDefault(); if(playing) activateSpecial(); } if(e.code==='Escape') { if(playing) togglePause(); } });

        // Elementos auxiliares
        const damageFlash = document.createElement('div'); damageFlash.id = 'damageFlash'; damageFlash.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:80;background:rgba(255,0,0,0);transition:background 0.1s;';
        document.getElementById('game-screen').appendChild(damageFlash);
        const comboDisplay = document.createElement('div'); comboDisplay.id = 'comboDisplay'; comboDisplay.style.cssText = 'position:absolute;top:120px;left:50%;transform:translateX(-50%);font-size:0px;color:#00e5ff;text-align:center;text-shadow:0 0 12px #00e5ff;pointer-events:none;z-index:50;transition:font-size 0.2s, opacity 0.5s;';
        document.getElementById('game-screen').appendChild(comboDisplay);
        const waveBanner = document.createElement('div'); waveBanner.id = 'waveBanner'; waveBanner.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#ffd700;text-align:center;text-shadow:0 0 20px #ffd700;pointer-events:none;z-index:60;opacity:0;transition:opacity 0.3s;';
        document.getElementById('game-screen').appendChild(waveBanner);
        const specialBar = document.createElement('div'); specialBar.id = 'specialBar'; specialBar.innerHTML = `<div class="special-label">SPECIAL POWER</div><div class="special-track"><div id="specialFill"></div></div><button id="specialBtn" class="pixel-btn btn-purple" onclick="window.activateSpecial()">ACTIVATE</button>`;
        specialBar.style.cssText = 'position:absolute;bottom:90px;left:50%;transform:translateX(-50%);width:min(300px,70%);z-index:40;text-align:center;';
        document.getElementById('game-screen').appendChild(specialBar);
        const specialBtn = document.getElementById('specialBtn');
        specialBtn.style.pointerEvents = 'none';
        specialBtn.style.opacity = '0.4';
        
        function showWaveBanner(txt) { const el=document.getElementById('waveBanner'); el.textContent=txt; el.style.opacity='1'; setTimeout(()=>el.style.opacity='0', 2500); }
        window.showWaveBanner = showWaveBanner;

        // Inicialización
        gameData.recordScore = parseInt(localStorage.getItem('bw_record_score')) || 0;
        loadBackgroundsData(); loadAchievements(); loadUpgrades(); loadMissions(); initCanvas(); updateUI(); updateLivesDisplay();
        if(!localStorage.getItem('bw_maxLives')) saveAllData();
    })();
</script>
</body>
</html>
